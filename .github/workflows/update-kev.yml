name: Update Threat Feeds

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-feeds:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Create data folder
        run: mkdir -p data

      - name: Download CISA KEV JSON
        run: |
          curl -fL --retry 3 \
            "https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json" \
            -o data/kev.json

      - name: Download Patch My PC RSS
        run: |
          curl -fL --retry 3 \
            -A "Mozilla/5.0" \
            "https://patchmypc.com/feed/" \
            -o data/patchmypc.xml
            
      - name: Download ZDI RSS
        run: |
          curl -fL --retry 3 \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" \
            "https://www.zerodayinitiative.com/rss/published/" \
            -o data/zdi.xml
          test -s data/zdi.xml
            
      - name: Validate downloaded files
        run: |
          test -s data/kev.json
          test -s data/patchmypc.xml
          test -s data/zdi.xml
          jq . data/kev.json > /dev/null
          head -n 5 data/patchmypc.xml
          head -n 5 data/zdi.xml

      - name: Commit updated feeds
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/kev.json data/patchmypc.xml
          git diff --cached --quiet && exit 0
          git commit -m "Update threat feeds"
          git pull --rebase origin main
          git push
